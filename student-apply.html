<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Verification | MediBridge AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="apply-page">
    <div class="apply-container">
        <div class="apply-header">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            <div class="logo-section">
                <div class="logo-icon"><i class="fa-solid fa-microchip"></i></div>
                <h2>MediBridge AI</h2>
            </div>
            <h1>Student Verification Application</h1>
            <p>Verify your medical education credentials for academic and research opportunities.</p>
        </div>

        <div class="apply-card">
            <form id="student-apply-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" id="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" id="email" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number <span class="required">*</span></label>
                        <input type="tel" id="phone" required>
                    </div>
                    <div class="form-group">
                        <label>Student ID <span class="required">*</span></label>
                        <input type="text" id="studentId" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>College/Institution <span class="required">*</span></label>
                        <input type="text" id="college" required>
                    </div>
                    <div class="form-group">
                        <label>Course <span class="required">*</span></label>
                        <input type="text" id="course" required placeholder="MBBS, BDS, MD, etc.">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Year/Semester <span class="required">*</span></label>
                        <select id="year" required>
                            <option value="">Select Year</option>
                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option>3rd Year</option>
                            <option>4th Year</option>
                            <option>Final Year</option>
                            <option>Internship</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>State <span class="required">*</span></label>
                         <select id="state" class="search-bar" required>
    <option value="">Select State</option>
    <option>Andhra Pradesh</option>
    <option>Arunachal Pradesh</option>
    <option>Assam</option>
    <option>Bihar</option>
    <option>Chhattisgarh</option>
    <option>Goa</option>
    <option>Gujarat</option>
    <option>Haryana</option>
    <option>Himachal Pradesh</option>
    <option>Jharkhand</option>
    <option>Karnataka</option>
    <option>Kerala</option>
    <option>Madhya Pradesh</option>
    <option>Maharashtra</option>
    <option>Manipur</option>
    <option>Meghalaya</option>
    <option>Mizoram</option>
    <option>Nagaland</option>
    <option>Odisha</option>
    <option>Punjab</option>
    <option>Rajasthan</option>
    <option>Sikkim</option>
    <option>Tamil Nadu</option>
    <option>Telangana</option>
    <option>Tripura</option>
    <option>Uttar Pradesh</option>
    <option>Uttarakhand</option>
    <option>West Bengal</option>

    <!-- Union Territories -->
    <option>Andaman and Nicobar Islands</option>
    <option>Chandigarh</option>
    <option>Dadra and Nagar Haveli and Daman and Diu</option>
    <option>Delhi</option>
    <option>Lakshadweep</option>
    <option>Puducherry</option>
    <option>Ladakh</option>
    <option>Jammu and Kashmir</option>
</select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="upload-box">
                    <input type="file" id="collegeIdFile" hidden>
                    <div class="upload-content">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Upload College ID Card<span class="required" style="color: red;">*</span></p>
                    <span>Click or drag file</span>
                    </div></label>
                </div>

                <div class="form-group">
                    <label class="upload-box">
                    <input type="file" id="bonafideFile" hidden>
                    <div class="upload-content">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Upload Bonafide Certificate<span class="required" style="color: red;">*</span></p>
                    <span>Click or drag file</span>
                    </div></label>
                </div>

                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="declaration" required>
                        I confirm that all information provided is accurate and complete.
                    </label>
                </div>

                <button type="submit" class="submit-btn">Submit Application <i class="fa-solid fa-arrow-right"></i></button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
