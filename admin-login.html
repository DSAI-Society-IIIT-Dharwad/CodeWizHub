<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MediBridge AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-login-page">
    <div class="login-glass-card">
        <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        <div class="logo-section" style="justify-content: center; padding-bottom: 20px;">
            <div class="logo-icon"><i class="fa-solid fa-microchip"></i></div>
            <h2 class="logo-text">MediBridge AI</h2>
        </div>
        <h3 style="margin-bottom: 10px; font-weight: 600;">Government Admin Portal</h3>
        <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem;">Authorized personnel only</p>

        <form id="admin-login-form">
            <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                <label style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; display: block;">Admin Email</label>
                <input type="email" id="email" class="search-bar" placeholder="admin@medibridge.ai" required style="max-width: none; margin-bottom: 0;">
            </div>
            <div class="form-group" style="text-align: left; margin-bottom: 25px;">
                <label style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; display: block;">Access Key</label>
                <input type="password" id="password" class="search-bar" placeholder="••••••••" required style="max-width: none; margin-bottom: 0;">
            </div>
            <button type="submit" class="login-btn-ultra">Secure Access</button>
            <p id="error-msg" style="margin-top: 20px; display: none; width: 100%; color: var(--rose); font-size: 0.85rem;"></p>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
