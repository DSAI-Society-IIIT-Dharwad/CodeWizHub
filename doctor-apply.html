<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Verification | MediBridge AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="apply-page">
    <div class="apply-container">
        <div class="apply-header">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            <div class="logo-section">
                <div class="logo-icon"><i class="fa-solid fa-microchip"></i></div>
                <h2>MediBridge AI</h2>
            </div>
            <h1>Doctor Verification Application</h1>
            <p>Please fill out this form to get your medical credentials verified by the Government of India.</p>
        </div>

        <div class="apply-card">
            <form id="doctor-apply-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" id="fullName" required placeholder="Dr. ...">
                    </div>
                    <div class="form-group">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" id="email" required placeholder="doctor@hospital.com">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number <span class="required">*</span></label>
                        <input type="tel" id="phone" required placeholder="10-digit mobile number">
                    </div>
                    <div class="form-group">
                        <label>Medical License Number <span class="required">*</span></label>
                        <input type="text" id="licenseNumber" required placeholder="MCI/State Registration Number">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Specialization <span class="required">*</span></label>
                        <select id="specialization" class="search-bar" required onchange="handleSpecialization(this)">
    <option value="">Select Specialization</option>
    <option>General Medicine</option>
    <option>Cardiology</option>
    <option>Neurology</option>
    <option>Orthopedics</option>
    <option>Pediatrics</option>
    <option>Dermatology</option>
    <option>Gynecology</option>
    <option>Psychiatry</option>
    <option>Radiology</option>
    <option>Anesthesiology</option>
    <option>ENT (Otolaryngology)</option>
    <option>Oncology</option>
    <option>Urology</option>
    <option>Ophthalmology</option>
    <option>Endocrinology</option>
    <option>Nephrology</option>
    <option>Gastroenterology</option>
    <option>Pulmonology</option>
    <option>Emergency Medicine</option>
    <option>Family Medicine</option>
    <option>Others</option>
</select>

<!-- Hidden input -->
<input type="text" id="otherSpecialization" class="search-bar" 
placeholder="Enter your specialization" style="display:none; margin-top:10px;">
                    </div>
                    <div class="form-group">
                        <label>Hospital/Clinic Name</label>
                        <input type="text" id="clinicName" placeholder="Where do you practice?">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>State <span class="required">*</span></label>
                        <select id="state" class="search-bar" required>
    <option value="">Select State</option>
    <option>Andhra Pradesh</option>
    <option>Arunachal Pradesh</option>
    <option>Assam</option>
    <option>Bihar</option>
    <option>Chhattisgarh</option>
    <option>Goa</option>
    <option>Gujarat</option>
    <option>Haryana</option>
    <option>Himachal Pradesh</option>
    <option>Jharkhand</option>
    <option>Karnataka</option>
    <option>Kerala</option>
    <option>Madhya Pradesh</option>
    <option>Maharashtra</option>
    <option>Manipur</option>
    <option>Meghalaya</option>
    <option>Mizoram</option>
    <option>Nagaland</option>
    <option>Odisha</option>
    <option>Punjab</option>
    <option>Rajasthan</option>
    <option>Sikkim</option>
    <option>Tamil Nadu</option>
    <option>Telangana</option>
    <option>Tripura</option>
    <option>Uttar Pradesh</option>
    <option>Uttarakhand</option>
    <option>West Bengal</option>

    <!-- Union Territories -->
    <option>Andaman and Nicobar Islands</option>
    <option>Chandigarh</option>
    <option>Dadra and Nagar Haveli and Daman and Diu</option>
    <option>Delhi</option>
    <option>Lakshadweep</option>
    <option>Puducherry</option>
    <option>Ladakh</option>
    <option>Jammu and Kashmir</option>
</select>
                    </div>
                    <div class="form-group">
                        <label>District/City <span class="required">*</span></label>
                        <input type="text" id="district" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Years of Experience <span class="required">*</span></label>
                        <input type="number" id="experience" required min="0" max="50">
                    </div>
                </div>

                <div class="form-group">
                    <label class="upload-box">
                    <input type="file" id="licenseUpload" hidden>
                    <div class="upload-content">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Upload Medical License</p><span class="required" style="color: red;">*</span>
                    <span>Click or drag file</span>
                    </div></label>
                </div>

                <div class="form-group">
                    <label class="upload-box">
                    <input type="file" id="additionalUpload" hidden>
                    <div class="upload-content">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Upload Additional Certificates(Optional)</p>
                    <span>Click or drag file</span>
                    </div></label>
                </div>

                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="declaration" required>
                        I hereby declare that all information provided is true and accurate to the best of my knowledge.
                    </label>
                </div>

                <button type="submit" class="submit-btn">Submit Application <i class="fa-solid fa-arrow-right"></i></button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
