<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Verification | MediBridge AI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Add this before appwrite-config.js -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #020617 0%, #0a0f2a 100%);
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
        }
        .apply-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .apply-header { text-align: center; margin-bottom: 40px; }
        .logo-section { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, #8b5cf6, #06b6d4); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .back-link { color: #94a3b8; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .apply-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 40px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: white; font-size: 0.95rem; }
        .required { color: #f43f5e; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #8b5cf6, #06b6d4); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(139,92,246,0.4); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: rgba(15,23,42,0.95); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 12px; z-index: 10000; animation: slideIn 0.3s ease; border-left: 4px solid; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        small { display: block; margin-top: 5px; color: #94a3b8; font-size: 0.75rem; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="apply-container">
        <div class="apply-header">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            <div class="logo-section">
                <div class="logo-icon"><i class="fa-solid fa-microchip"></i></div>
                <h2>MediBridge AI</h2>
            </div>
            <h1>Doctor Verification Application</h1>
            <p style="color: #94a3b8;">Submit your credentials for government verification</p>
        </div>

        <div class="apply-card">
            <form id="doctorApplyForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Email <span class="required">*</span></label>
                        <input type="email" id="email" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number <span class="required">*</span></label>
                        <input type="tel" id="phoneNumber" required>
                    </div>
                    <!-- Add this inside your form, after phone number field -->
<div class="form-row">
    <div class="form-group">
        <label>Create Password <span class="required">*</span></label>
        <input type="password" id="password" required minlength="6">
        <small>Minimum 6 characters</small>
    </div>
    <div class="form-group">
        <label>Confirm Password <span class="required">*</span></label>
        <input type="password" id="confirmPassword" required>
    </div>
</div>
                    <div class="form-group">
                        <label>Aadhar Number (Doctor ID) <span class="required">*</span></label>
                        <input type="text" id="aadharNumber" required placeholder="12-digit Aadhar number" pattern="[0-9]{12}">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Medical License Number <span class="required">*</span></label>
                        <input type="text" id="licenseNumber" required>
                    </div>
                    <div class="form-group">
                        <label>Specialization <span class="required">*</span></label>
                        <select id="specialization" required>
                            <option value="">Select</option>
                            <option>Cardiology</option><option>Neurology</option><option>Pediatrics</option>
                            <option>General Medicine</option><option>Orthopedics</option><option>Gynecology</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Hospital/Clinic Name</label>
                        <input type="text" id="clinicName">
                    </div>
                    <div class="form-group">
                        <label>Years of Experience <span class="required">*</span></label>
                        <input type="number" id="experience" required min="0" max="50">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>State <span class="required">*</span></label>
                        <select id="state" required>
                            <option value="">Select State</option>
                            <option>Andhra Pradesh</option><option>Delhi</option><option>Karnataka</option>
                            <option>Maharashtra</option><option>Tamil Nadu</option><option>Uttar Pradesh</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>District/City <span class="required">*</span></label>
                        <input type="text" id="district" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Upload Medical License <span class="required">*</span></label>
                    <input type="file" id="licenseFile" accept=".pdf,.jpg,.png" required>
                    <small>PDF, JPG, or PNG (Max 5MB)</small>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: left; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="declaration" required>
                        I hereby declare that all information provided is true and accurate.
                    </label>
                </div>

                <button type="submit" class="submit-btn">Submit Application <i class="fa-solid fa-arrow-right"></i></button>
            </form>
        </div>
    </div>

    <script src="appwrite-config.js"></script>
    <script>
        document.getElementById('doctorApplyForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Get password and confirm
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    // Validate passwords match
    if (password !== confirmPassword) {
        showToast('❌ Passwords do not match!', 'error');
        return;
    }
    
    // Validate password length
    if (password.length < 6) {
        showToast('❌ Password must be at least 6 characters!', 'error');
        return;
    }
    
    // ENCRYPT THE PASSWORD - THIS WAS MISSING!
    const encryptedPassword = btoa(password);  // ← Add this line
    
    const submitBtn = document.querySelector('.submit-btn');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
    
    const doctorData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phoneNumber: document.getElementById('phoneNumber').value,
        aadharNumber: document.getElementById('aadharNumber').value,
        licenseNumber: document.getElementById('licenseNumber').value,
        specialization: document.getElementById('specialization').value,
        clinicName: document.getElementById('clinicName').value || '',
        experience: parseInt(document.getElementById('experience').value),
        state: document.getElementById('state').value,
        district: document.getElementById('district').value,
        password: encryptedPassword,  // ← Now encryptedPassword exists!
        status: 'pending',
        submittedAt: new Date().toISOString()
    };
    
    const file = document.getElementById('licenseFile').files[0];
    if (file) doctorData.proofUrl = file.name;
    
    try {
        const result = await appwriteService.createDocument('doctor_requests', doctorData);
        showToast('✅ Application submitted! You will receive email notification once reviewed.', 'success');
        document.getElementById('doctorApplyForm').reset();
        
        // Send confirmation email
        await appwriteService.sendEmailNotification(
            doctorData.email,
            'Application Received - MediBridge AI',
            `Dear Dr. ${doctorData.name},\n\nYour verification application has been received and is under review. You will be notified via email once a decision is made.\n\nThank you,\nMediBridge AI Team`,
            'pending'
        );
    } catch (error) {
        console.error('Submission error:', error);
        showToast('❌ Submission failed: ' + error.message, 'error');
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
    }
});
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'success' ? '#10b981' : '#f43f5e';
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'}" style="margin-right: 10px;"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
    </script>
</body>
</html>
